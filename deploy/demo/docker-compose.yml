# Demo stack: Kafka (KRaft, no Zookeeper) + Postgres + MailHog + Job API + Worker.
# Usage: docker compose -f deploy/demo/docker-compose.yml up -d
# Then apply Postgres schema and run ./scripts/demo.sh (see README Demo section)

services:
  # Kafka in KRaft mode (no Zookeeper). Uses Apache Kafka image (pullable when Bitnami fails).
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
      POSTGRES_DB: jobs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs"]
      interval: 2s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  job-api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    ports:
      - "8083:8080"
      - "9090:9090"
    environment:
      REST_ADDR: ":8080"
      METRICS_ADDR: ":9090"
      POSTGRES_DSN: "postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: job.events
      KAFKA_JOBS_TOPIC: job.requests
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  job-worker:
    build:
      context: ../..
      dockerfile: Dockerfile.worker
    environment:
      POSTGRES_DSN: "postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: job.events
      KAFKA_JOBS_TOPIC: job.requests
      KAFKA_CONSUMER_GROUP: job-worker
      SMTP_ADDR: mailhog:1025
      EMAIL_FROM: noreply@localhost
      REPORT_OUTPUT_DIR: /out
      INVOICE_OUTPUT_DIR: /out
      IMAGE_OUTPUT_DIR: /out
    volumes:
      - ../../out:/out
    depends_on:
      - kafka
      - postgres
      - job-api

  user-service:
    build:
      context: ../..
      dockerfile: Dockerfile.user-service
    ports:
      - "8081:8081"
    environment:
      JOB_API_URL: http://job-api:8080
      LISTEN_ADDR: ":8081"
    depends_on:
      - job-api

  billing-service:
    build:
      context: ../..
      dockerfile: Dockerfile.billing-service
    ports:
      - "8082:8082"
    environment:
      JOB_API_URL: http://job-api:8080
      LISTEN_ADDR: ":8082"
    depends_on:
      - job-api

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/demo/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      JOB_API_URL: http://job-api:8080
      LISTEN_ADDR: ":8080"
    depends_on:
      - job-api

